<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Pet — Embedded Companion Device Build Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF5FA;
    --panel:#FFFFFF;
    --ink:#4A2E4D;
    --ink-soft:#8B6F92;
    --green:#7FE0C4;
    --green-dark:#3FBE9C;
    --sky:#B39DDB;
    --sky-bg:#F1EAFB;
    --coral:#FF6F91;
    --coral-bg:#FFE9EF;
    --yellow:#F5C242;
    --yellow-bg:#FFF8E1;
    --teal:#FF8FB8;
    --teal-bg:#FFE3EF;
    --border:#F5DCEA;
    --shadow: 0 6px 20px rgba(140, 60, 110, 0.10);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Nunito', sans-serif; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,.display{ font-family:'Baloo 2', sans-serif; }
  .app{ max-width: 980px; margin: 0 auto; padding: 20px 16px 60px; }
  .hero{ text-align:center; margin-bottom: 18px; }
  .hero h1{ font-size: clamp(1.4rem, 4vw, 2.2rem); margin: 0 0 4px; color: var(--ink); }
  .hero p{ margin:0; color:var(--ink-soft); font-weight:700; font-size:0.95rem; }
  .tracker-wrap{ background: var(--panel); border-radius: 20px; padding: 18px 14px 10px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
  .tracker-label{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; padding: 0 4px; }
  .tracker-label b{ font-family:'Baloo 2'; font-size:1rem; }
  .tracker-label span{ font-size:0.85rem; color:var(--ink-soft); font-weight:700;}
  .circuit-svg{ width:100%; height:auto; display:block; }
  .layout{ display:grid; grid-template-columns: 230px 1fr; gap:18px; align-items:start; }
  @media (max-width: 760px){ .layout{ grid-template-columns: 1fr; } }
  .steplist{ background:var(--panel); border-radius:18px; padding:10px; box-shadow: var(--shadow); border:1px solid var(--border); position: sticky; top: 12px; max-height: 78vh; overflow-y:auto; }
  @media (max-width: 760px){ .steplist{ position:static; max-height:none; display:flex; flex-wrap:wrap; gap:6px; } }
  .step-btn{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; padding:9px 10px; margin-bottom:4px; border:none; border-radius:12px; background:transparent; cursor:pointer; font-family:'Nunito'; font-weight:700; font-size:0.85rem; color:var(--ink-soft); transition: background .15s ease, color .15s ease; }
  @media (max-width:760px){ .step-btn{ width:auto; margin-bottom:0; } }
  .step-btn:hover{ background: var(--teal-bg); }
  .step-btn.active{ background: var(--ink); color:#fff; }
  .step-btn .dot{ flex:0 0 20px; height:20px; width:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; background: var(--border); color:var(--ink-soft); }
  .step-btn.done .dot{ background: var(--green); color:#fff; }
  .step-btn.active .dot{ background: var(--teal); color:#fff; }
  .panel{ background: var(--panel); border-radius:20px; padding: 22px 24px 26px; box-shadow: var(--shadow); border:1px solid var(--border); min-height: 420px; }
  .badge{ display:inline-block; background: var(--teal); color:#fff; font-family:'Baloo 2'; font-size:0.75rem; padding: 4px 12px; border-radius:999px; letter-spacing:0.03em; margin-bottom: 10px; }
  .panel h2{ margin: 2px 0 12px; font-size:1.5rem; display:flex; align-items:center; gap:8px;}
  .callout{ border-radius:14px; padding:14px 16px; margin: 14px 0; font-size:0.92rem; line-height:1.5;}
  .callout b.tag{ display:block; font-family:'Baloo 2'; font-size:0.85rem; margin-bottom:4px; }
  .why{ background:var(--sky-bg); color:#3B2A5E; }
  .why b.tag{ color:var(--sky); }
  .mistake{ background:var(--coral-bg); color:#7A1F38; }
  .mistake b.tag{ color:var(--coral); }
  .checklist-box{ background:var(--yellow-bg); border-radius:14px; padding:14px 16px; margin:14px 0;}
  .checklist-box b.tag{ font-family:'Baloo 2'; font-size:0.85rem; color:var(--yellow); display:block; margin-bottom:6px;}
  .steps-list{ margin:10px 0; padding-left:0; list-style:none; }
  .steps-list li{ display:flex; gap:10px; padding:7px 0; font-size:0.94rem; line-height:1.45; border-bottom: 1px dashed var(--border); }
  .steps-list li:last-child{ border-bottom:none; }
  .steps-list .num{ flex:0 0 22px; height:22px; border-radius:50%; background:var(--ink); color:#fff; font-size:0.72rem; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .diagram-wrap{ text-align:center; margin: 16px 0; }
  .diagram-wrap svg{ max-width: 100%; height:auto; }
  .nav-row{ display:flex; justify-content:space-between; align-items:center; margin-top:22px; gap:10px; flex-wrap:wrap; }
  .navbtn{ font-family:'Baloo 2'; font-weight:700; border:none; border-radius:999px; padding:10px 18px; cursor:pointer; font-size:0.9rem; transition: transform .1s ease; }
  .navbtn:active{ transform: scale(0.96); }
  .navbtn.prev{ background: var(--border); color: var(--ink-soft); }
  .navbtn.next{ background: var(--ink); color:#fff; }
  .navbtn:disabled{ opacity:0.35; cursor:default; }

  .done-toggle input{ width:18px; height:18px; accent-color: var(--green-dark); }
  .check-row{ display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:0.9rem; }
  .check-row input{ margin-top:3px; width:16px; height:16px; accent-color: var(--green-dark); flex:0 0 16px; }
  .footer-note{ text-align:center; color:var(--ink-soft); font-size:0.8rem; margin-top: 22px; }
  code{ background: var(--sky-bg); color:#3B2A5E; padding: 1px 6px; border-radius:6px; font-size:0.88em; }
</style>
</head>

<script>
// ---------- SVG HELPERS ----------
function wire(x1,y1,x2,y2,arrow){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--ink-soft)" stroke-width="3" stroke-linecap="round" ${arrow?'marker-end="url(#arrow)"':''}/>`;
}
function box(x,y,w,h,text,fillC,strokeC,fontSize){
  fontSize = fontSize||14;
  const lines = String(text).split('\n');
  const startY = y+h/2 - ((lines.length-1)*fontSize*0.6);
  const texts = lines.map((line,i)=>`<text x="${x+w/2}" y="${startY+i*fontSize*1.25}" text-anchor="middle" font-size="${fontSize}" font-weight="800" font-family="Baloo 2" fill="var(--ink)">${line}</text>`).join('');
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="12" fill="${fillC}" stroke="${strokeC}" stroke-width="3"/>${texts}`;
}
function iconCircle(x,y,r,label,colorVar,emoji){
  let s = `<circle cx="${x}" cy="${y}" r="${r}" fill="${colorVar}bg" stroke="${colorVar}" stroke-width="3"/>`;
  if(emoji) s += `<text x="${x}" y="${y+7}" text-anchor="middle" font-size="20">${emoji}</text>`;
  s += `<text x="${x}" y="${y+r+20}" text-anchor="middle" font-size="12" font-weight="800" font-family="Baloo 2" fill="var(--ink-soft)">${label}</text>`;
  return s;
}
function sensorIcon(x,y,label,emoji){
  return `<circle cx="${x}" cy="${y}" r="24" fill="var(--sky-bg)" stroke="var(--sky)" stroke-width="3"/><text x="${x}" y="${y+8}" text-anchor="middle" font-size="22">${emoji}</text><text x="${x}" y="${y+42}" text-anchor="middle" font-size="12" font-weight="800" font-family="Baloo 2" fill="var(--ink-soft)">${label}</text>`;
}
function lightIcon(x,y,label,colorVar){
  return `<circle cx="${x}" cy="${y}" r="16" fill="${colorVar}" opacity="0.3"/><circle cx="${x}" cy="${y}" r="9" fill="${colorVar}"/><text x="${x}" y="${y+34}" text-anchor="middle" font-size="12" font-weight="800" font-family="Baloo 2" fill="var(--ink-soft)">${label}</text>`;
}
function caption(x,y,text,size,color){
  return `<text x="${x}" y="${y}" text-anchor="middle" font-size="${size||12}" font-weight="700" fill="${color||'var(--ink-soft)'}">${text}</text>`;
}
function svgWrap(vbW,vbH,content){
  return `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="var(--green-dark)"/></marker></defs>
    ${content}
  </svg>`;
}

function diagWatchdog(){

  s += wire(210,47,280,47,true);
  s += box(280,20,200,55,'Watchdog checks\ntime since last kick','var(--sky-bg)','var(--sky)',13);
  s += wire(380,75,380,112,true);

}
function diagEvents(){

  s += sensorIcon(70,55,'Dialogue','💌');
  s += sensorIcon(195,55,'Weather','🌦');
  s += sensorIcon(320,55,'Season','🍂');
  s += wire(70,115,70,150,true);
  s += wire(195,115,195,150,true);
  s += wire(320,115,320,150,true);
  s += box(30,150,330,55,'Scheduled event tasks\n(decorative, read-only)','var(--teal-bg)','var(--teal)',13);

}
function diagAccessories(){
  let s='';
  s += box(20,20,170,55,'coins stat','var(--sky-bg)','var(--sky)',15);
  s += wire(190,47,260,47,true);

function diagMemoryBook(){

  s += wire(480,80,550,80,true);

function diagTest(){

  s += box(15,10,430,190,'','var(--yellow-bg)','var(--yellow)');
  const items=['Fresh boot + clean first run', 'Decay, mood shift, sleep all fire alone', 'Rapid presses stay debounced', 'Force-close/reopen restores state'];
  items.forEach((t,i)=>{

    s += `<rect x="35" y="${y-15}" width="22" height="22" rx="5" fill="#fff" stroke="var(--green-dark)" stroke-width="3"/><path d="M 39 ${y-4} l6 6 l12 -14" stroke="var(--green-dark)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

function diagPolish(){

// ---------- STEPS ----------
const STEPS = [
  {
    icon:"🌼", title:"Project Setup & PetOS Boot Sequence",
    why:"Skipping setup means fighting import errors right when you're trying to write the fun part. A clean file structure up front is also what lets you plug the later systems (scheduler, FSM, storage) together without a rewrite.",
    instructions:[
      "Create your project folder: <code>pixel-pet/</code>, with subfolders <code>assets/sprites/</code> and <code>screenshots/</code>.",
      "Inside it, create empty files: <code>main.py</code>, <code>gpio.py</code>, <code>scheduler.py</code>, <code>state_machine.py</code>, <code>display.py</code>, <code>pet.py</code>, <code>power.py</code>, <code>storage.py</code>, <code>watchdog.py</code>, <code>events.py</code>.",
      "Set up a virtual environment, then <code>pip install pygame</code> and add it to <code>requirements.txt</code>.",
      "In <code>main.py</code>, write a printed PetOS boot sequence: <code>🌼 PetOS v1.0</code>, then lines like 'Initializing GPIO...' each followed by a checkmark, with a short <code>time.sleep(0.3)</code> between lines for effect.",
      "Run <code>main.py</code> and confirm the full boot sequence prints top to bottom without errors, even though nothing else is built yet."
    ],
    diagram: diagSetup(),
    checklist:["Project folder + subfolders created", "All module files created (empty is fine)", "pygame installed and in requirements.txt", "Boot sequence written in main.py", "Boot sequence runs cleanly start to finish"],
    mistakes:["Writing all logic straight into main.py from the start instead of splitting into modules — this makes wiring later steps together much more painful than it needs to be.","Skipping the small time.sleep delays — without them the boot sequence reads as one instant text dump instead of a device actually starting up."]
  },
  {
    icon:"🕹️", title:"Simulated GPIO & Button Input",
    why:"In real embedded systems, buttons are read via GPIO pins polled by firmware, not handled directly by whatever UI framework is on top. Building a small abstraction layer here, even mapped to keyboard keys, teaches you to separate 'what hardware exists' from 'what the firmware does with it' — a distinction every embedded interview will probe.",
    instructions:[
      "In <code>gpio.py</code>, define pin mappings — e.g. <code>PIN_FEED</code>, <code>PIN_PLAY</code>, <code>PIN_SLEEP</code>, <code>PIN_MENU</code> — each mapped to a keyboard key constant like <code>pygame.K_1</code>.",
      "Write a <code>read_pins(pygame_events)</code> function that scans the event queue and returns which 'pins' are currently HIGH, as an abstraction, not raw pygame key names.",
      "In main.py's loop skeleton, call <code>read_pins()</code> each frame and print which pin went high, just to confirm input is being detected.",
      "Add basic debounce logic: ignore a pin re-triggering within roughly 150ms of its last press, mirroring how real button debounce works in firmware.",
      "Test by pressing each of the 4 buttons multiple times quickly and confirming debounce keeps a single tap from firing multiple times."
    ],
    diagram: diagGPIO(),
    checklist:["Pin mapping defined for Feed/Play/Sleep/Menu", "read_pins() returns pin states", "Main loop prints detected presses", "Debounce logic implemented", "Debounce tested with rapid key presses"],
    mistakes:["Reading pygame keys directly all over the codebase instead of going through gpio.py — this defeats the abstraction and makes later features much harder to wire in.","Skipping debounce — without it a single tap registers as many presses, and every stat interaction later will feel broken."]
  },
  {
    icon:"⏱️", title:"Cooperative Scheduler (Timer-Driven Tasks)",
    why:"Real embedded firmware rarely has one big loop doing everything at once — it runs a scheduler that calls different tasks at different intervals. Building this pattern is one of the most recognizable 'this person actually understands embedded systems' signals in a portfolio.",
    instructions:[
      "In <code>scheduler.py</code>, write a Task representation holding a function reference, an interval in seconds, and a last_run timestamp.",
      "Write a <code>Scheduler</code> class with <code>add_task(func, interval)</code> and a <code>run_due_tasks(current_time)</code> method that calls any task whose interval has elapsed.",
      "In main.py's loop, create one Scheduler instance and register a couple of dummy tasks (e.g. print 'tick' every 1s, print 'slow tick' every 5s).",
      "Call <code>scheduler.run_due_tasks(time.time())</code> once per frame inside your main loop.",
      "Run it for at least 15 seconds and confirm the fast and slow tasks fire at their own correct, independent intervals."
    ],
    diagram: diagScheduler(),
    checklist:["Task representation created", "Scheduler class with add_task/run_due_tasks", "Scheduler wired into main loop", "Two dummy tasks with different intervals registered", "15+ second run confirms independent, accurate timing"],
    mistakes:["Using time.sleep() inside individual tasks — this freezes the whole main loop and breaks input handling.","Hardcoding intervals directly inside main.py instead of passing them into add_task() — you'll want to tune these later without hunting through loop code."]
  },
  {

let current = 0;
let doneFlags = new Array(STEPS.length).fill(false);

function renderTracker(){
  const svg = document.getElementById('circuitTracker');
  const n = STEPS.length;
  const w = 940, y = 40, marginX = 30;
  const usableW = w - marginX*2;
  const step = usableW/(n-1);
  let html = '';
  html += `<line x1="${marginX}" y1="${y}" x2="${w-marginX}" y2="${y}" stroke="var(--border)" stroke-width="6" stroke-linecap="round"/>`;
  for(let i=0;i<n-1;i++){
    if(doneFlags[i] && doneFlags[i+1]){
      const x1 = marginX + step*i, x2 = marginX + step*(i+1);
      html += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="var(--green)" stroke-width="6" stroke-linecap="round"/>`;
    } else if(doneFlags[i]){
      const x1 = marginX + step*i, x2 = x1 + step*0.5;
      html += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="var(--green)" stroke-width="6" stroke-linecap="round"/>`;
    }
  }
  for(let i=0;i<n;i++){
    const x = marginX + step*i;
    const isDone = doneFlags[i];
    const isActive = i===current;
    const fill = isDone ? 'var(--green)' : (isActive ? 'var(--teal)' : '#fff');
    const stroke = isDone ? 'var(--green-dark)' : (isActive ? 'var(--teal)' : 'var(--border)');
    html += `<circle cx="${x}" cy="${y}" r="15" fill="${fill}" stroke="${stroke}" stroke-width="3"/>`;
    html += `<text x="${x}" y="${y+5}" text-anchor="middle" font-size="14">${isDone?'✓':STEPS[i].icon}</text>`;
  }
  svg.innerHTML = html;
  document.getElementById('progressText').textContent = doneFlags.filter(Boolean).length + ' / ' + n + ' steps lit';
}

function renderStepList(){
  const el = document.getElementById('steplist');
  el.innerHTML = STEPS.map((s,i)=>{
    const cls = ['step-btn', i===current?'active':'', doneFlags[i]?'done':''].join(' ').trim();
    return `<button class="${cls}" onclick="goTo(${i})"><span class="dot">${doneFlags[i]?'✓':(i+1)}</span> ${s.icon} ${s.title}</button>`;
  }).join('');
}

function renderPanel(){
  const s = STEPS[current];
  const el = document.getElementById('panel');
  el.innerHTML = `
    <span class="badge">STEP ${current+1} OF ${STEPS.length}</span>
    <h2>${s.icon} ${s.title}</h2>
    <div class="callout why"><b class="tag">💡 Why are we doing this?</b>${s.why}</div>
    <ol class="steps-list">
      ${s.instructions.map((t,i)=>`<li><span class="num">${i+1}</span><span>${t}</span></li>`).join('')}
    </ol>
    <div class="diagram-wrap">${s.diagram}</div>
    <div class="checklist-box">
      <b class="tag">📌 Quick checklist</b>
      ${s.checklist.map((c,i)=>`<label class="check-row"><input type="checkbox" data-ci="${i}"><span>${c}</span></label>`).join('')}
    </div>
    <div class="callout mistake"><b class="tag">🚧 Common mistakes</b>
      <ul style="margin:4px 0 0; padding-left:18px;">${s.mistakes.map(m=>`<li style="margin-bottom:4px;">${m}</li>`).join('')}</ul>
    </div>
    <div class="nav-row">
      <button class="navbtn prev" onclick="goTo(${current-1})" ${current===0?'disabled':''}>⬅ Back</button>
      <label class="done-toggle"><input type="checkbox" id="doneBox" ${doneFlags[current]?'checked':''} onchange="toggleDone(this.checked)"> Mark this step done</label>
      <button class="navbtn next" onclick="goTo(${current+1})" ${current===STEPS.length-1?'disabled':''}>Next ➡</button>
    </div>
  `;
}

function toggleDone(val){ doneFlags[current] = val; renderTracker(); renderStepList(); }

function goTo(i){
  if(i<0 || i>=STEPS.length) return;
  current = i;
  renderPanel(); renderTracker(); renderStepList();
  document.getElementById('panel').scrollIntoView({behavior:'smooth', block:'start'});
}

renderPanel(); renderTracker(); renderStepList();
</script>
